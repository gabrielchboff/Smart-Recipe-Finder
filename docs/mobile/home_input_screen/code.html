<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#ffffff",
              "on-error": "#ffffff",
              "on-background": "#1a1c1c",
              "error": "#ba1a1a",
              "on-surface": "#1a1c1c",
              "inverse-primary": "#c6c6c6",
              "on-tertiary-fixed-variant": "#e3e2e2",
              "on-secondary-container": "#1b1c1c",
              "on-secondary-fixed-variant": "#3b3b3b",
              "on-tertiary": "#e3e2e2",
              "secondary-fixed-dim": "#acabab",
              "on-tertiary-fixed": "#ffffff",
              "inverse-surface": "#2f3131",
              "surface-variant": "#e2e2e2",
              "on-secondary-fixed": "#1b1c1c",
              "inverse-on-surface": "#f1f1f1",
              "on-primary-fixed": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#eeeeee",
              "on-primary-fixed-variant": "#e2e2e2",
              "surface": "#f9f9f9",
              "primary-fixed-dim": "#474747",
              "surface-tint": "#5e5e5e",
              "surface-container-low": "#f3f3f3",
              "on-primary-container": "#ffffff",
              "outline": "#777777",
              "surface-bright": "#f9f9f9",
              "tertiary-fixed": "#5e5e5f",
              "surface-container-high": "#e8e8e8",
              "surface-dim": "#dadada",
              "primary": "#000000",
              "outline-variant": "#c6c6c6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .blueprint-x {
            position: relative;
        }
        .blueprint-x::before, .blueprint-x::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top left, transparent calc(50% - 1px), #c6c6c6 50%, transparent calc(50% + 1px)),
                        linear-gradient(to top right, transparent calc(50% - 1px), #c6c6c6 50%, transparent calc(50% + 1px));
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f9]/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center">
<span class="material-symbols-outlined text-black dark:text-white cursor-pointer">menu</span>
</div>
<div class="font-['Inter'] uppercase tracking-widest text-[0.6875rem] font-bold text-black dark:text-white">
<span class="text-xl font-black tracking-tighter text-black dark:text-white">RECIPE_SCHEMATIC</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface-dim flex items-center justify-center overflow-hidden border border-outline-variant/20">
<span class="material-symbols-outlined text-[1.2rem]">person</span>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-16 mb-20 px-6 py-8 flex flex-col gap-8 max-w-2xl mx-auto w-full">
<!-- Hero Section Asymmetric Layout -->
<section class="flex flex-col gap-2">
<h1 class="font-headline font-black text-5xl md:text-6xl tracking-tighter leading-none opacity-90">
                INPUT_MOD_01
            </h1>
<p class="font-label text-[0.6875rem] uppercase tracking-[0.2em] text-outline">
                CONSTRUCTING CULINARY LOGIC
            </p>
</section>
<!-- Schematic Image Placeholder (Asymmetric) -->
<div class="w-full h-48 bg-surface-container-low blueprint-x border border-outline-variant/20 rounded-lg overflow-hidden flex items-center justify-center">
<span class="font-label text-[0.625rem] text-outline-variant uppercase tracking-widest bg-surface px-2 py-1 z-10">Visual_Reference_Null</span>
</div>
<!-- Ingredient Input Section -->
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-1">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-wider text-primary">Ingredient Entry</label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none focus:ring-1 focus:ring-primary p-4 h-32 font-body text-sm rounded-DEFAULT resize-none placeholder:text-outline/40" placeholder="Type ingredients here (e.g. 2 cloves of garlic, 500g chicken...)"></textarea>
<div class="absolute bottom-2 right-2">
<button class="bg-primary text-on-primary px-4 py-2 font-label text-[0.6875rem] font-black uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all">
                            ADD+
                        </button>
</div>
</div>
</div>
<!-- Tags Section -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-baseline">
<span class="font-label text-[0.625rem] text-outline uppercase tracking-widest">Active_Inventory</span>
<span class="font-label text-[0.625rem] text-outline uppercase">Count: 03</span>
</div>
<div class="flex flex-wrap gap-2">
<!-- Tag: Onion -->
<div class="flex items-center gap-2 bg-surface-container-lowest px-3 py-1.5 border border-outline-variant/30 rounded-DEFAULT group hover:border-primary transition-colors">
<span class="font-label text-[0.6875rem] font-bold uppercase tracking-tight">onion</span>
<span class="material-symbols-outlined text-[14px] cursor-pointer text-outline group-hover:text-primary">close</span>
</div>
<!-- Tag: Garlic -->
<div class="flex items-center gap-2 bg-surface-container-lowest px-3 py-1.5 border border-outline-variant/30 rounded-DEFAULT group hover:border-primary transition-colors">
<span class="font-label text-[0.6875rem] font-bold uppercase tracking-tight">garlic</span>
<span class="material-symbols-outlined text-[14px] cursor-pointer text-outline group-hover:text-primary">close</span>
</div>
<!-- Tag: Tomatoes -->
<div class="flex items-center gap-2 bg-surface-container-lowest px-3 py-1.5 border border-outline-variant/30 rounded-DEFAULT group hover:border-primary transition-colors">
<span class="font-label text-[0.6875rem] font-bold uppercase tracking-tight">tomatoes</span>
<span class="material-symbols-outlined text-[14px] cursor-pointer text-outline group-hover:text-primary">close</span>
</div>
</div>
</div>
</div>
<!-- Technical Specification Ghost Box -->
<div class="p-4 border border-outline-variant/20 rounded-lg bg-surface-container-low flex flex-col gap-4">
<div class="flex gap-4">
<div class="flex-1">
<p class="font-label text-[0.625rem] text-outline uppercase tracking-tighter mb-1">System_Status</p>
<div class="h-1 w-full bg-surface-dim rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
</div>
<div class="flex-1 text-right">
<p class="font-label text-[0.625rem] text-outline uppercase tracking-tighter mb-1">Logic_Check</p>
<p class="font-label text-[0.6875rem] font-bold text-primary uppercase">Valid_Sequence</p>
</div>
</div>
</div>
<!-- Find Recipes Action -->
<div class="mt-auto pt-8">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container py-5 rounded-DEFAULT flex items-center justify-center gap-4 group active:scale-[0.99] transition-all">
<span class="font-headline font-black text-lg tracking-[0.2em] uppercase">Find Recipes</span>
<span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 px-4 pb-safe bg-[#f9f9f9] dark:bg-neutral-900 z-50 border-t border-[#c6c6c6]/20"><!-- EXPLORE (Active) -->
<div class="flex flex-col items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-sm py-2 px-4 hover:bg-[#dadada] dark:hover:bg-neutral-700 transition-all duration-200 ease-in-out cursor-pointer">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Inter'] font-bold text-[10px] tracking-widest uppercase">EXPLORE</span>
</div>
<!-- SAVED -->
<div class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-400 py-2 px-4 hover:bg-[#dadada] dark:hover:bg-neutral-700 transition-all duration-200 ease-in-out cursor-pointer">
<span class="material-symbols-outlined">bookmark</span>
<span class="font-['Inter'] font-bold text-[10px] tracking-widest uppercase">SAVED</span>
</div>
<!-- PLANNER -->
<div class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-400 py-2 px-4 hover:bg-[#dadada] dark:hover:bg-neutral-700 transition-all duration-200 ease-in-out cursor-pointer">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-['Inter'] font-bold text-[10px] tracking-widest uppercase">PLANNER</span>
</div>
<!-- PROFILE -->
<div class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-400 py-2 px-4 hover:bg-[#dadada] dark:hover:bg-neutral-700 transition-all duration-200 ease-in-out cursor-pointer">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] font-bold text-[10px] tracking-widest uppercase">PROFILE</span>
</div></nav>
<!-- Blueprint Grid Overlay (Subtle) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]" style="background-size: 40px 40px; background-image: linear-gradient(to right, #000 1px, transparent 1px), linear-gradient(to bottom, #000 1px, transparent 1px);">
</div>
</body></html>
