  <!-- Fork tines inside magnifying glass -->
  <line x1="22" y1="17" x2="22" y2="28" stroke="#E8722A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="17" x2="26" y2="28" stroke="#E8722A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="17" x2="30" y2="28" stroke="#E8722A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fork base -->
