<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://img.spoonacular.com https://spoonacular.com data:; connect-src 'self' https://api.spoonacular.com https://api.edamam.com;" />
    <title>Smart Recipe Finder | Register</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/style.css" />
    <script src="/scripts/signup.js" type="module"></script>
  </head>
  <body>
    <header class="header" id="main-header"></header>

    <main class="main">
      <div class="auth-page">
        <h1 class="auth-page__title">Register</h1>
        <p class="auth-page__subtitle">
          Create your account to save recipes and set dietary preferences.
        </p>

        <form id="signupForm" novalidate>
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input
              type="text"
              class="form-input"
              id="signupName"
              placeholder="Your full name"
              required
            />
            <p class="form-error" id="nameError"></p>
          </div>

          <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input
              type="email"
              class="form-input"
              id="signupEmail"
              placeholder="you@example.com"
              required
            />
            <p class="form-error" id="emailError"></p>
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input
              type="password"
              class="form-input"
              id="signupPassword"
              placeholder="Create a password"
              required
            />
            <p class="form-error" id="passwordError"></p>
          </div>

          <div class="form-group">
            <label for="signupConfirm">Confirm Password</label>
            <input
              type="password"
              class="form-input"
              id="signupConfirm"
              placeholder="Repeat your password"
              required
            />
            <p class="form-error" id="confirmError"></p>
          </div>

          <p class="form-error" id="signupError" style="margin-bottom: 16px"></p>

          <button type="submit" class="btn btn--primary btn--block btn--lg">
            Create Account &rarr;
          </button>
        </form>

        <p class="auth-page__footer">
          Already have an account? <a href="/login/">Sign in</a>
        </p>
      </div>
    </main>

    <footer class="footer" id="main-footer"></footer>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </body>
</html>
